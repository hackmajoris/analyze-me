<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyze Me — Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:        oklch(0.17 0.015 250);
      --panel:     oklch(0.22 0.015 250);
      --text:      oklch(0.96 0.005 250);
      --text-dim:  oklch(0.72 0.015 250);
      --line:      oklch(0.30 0.015 250);
      --accent:    oklch(0.65 0.14 250);
      --warn-bg:   oklch(0.25 0.04 60);
      --warn-line: oklch(0.55 0.12 60);
      --warn-text: oklch(0.82 0.08 60);
      --err:       oklch(0.65 0.18 25);
    }

    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* macOS traffic lights eat ~28px at the top */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 28px;
    }

    .card {
      width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 36px 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 28px; height: 28px;
      border-radius: 9px;
      background: linear-gradient(135deg, oklch(0.68 0.14 25), oklch(0.62 0.14 250));
      position: relative;
      flex-shrink: 0;
    }

    .brand-mark::after {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 4px;
      background: var(--panel);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0 0 28px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"],
    input[type="password"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      min-width: 0;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .browse-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .browse-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .warn {
      background: var(--warn-bg);
      border: 1px solid var(--warn-line);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--warn-text);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .warn strong { font-weight: 600; }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: -0.01em;
    }

    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .submit-btn:not(:disabled):hover { opacity: 0.88; }

    .error {
      font-size: 12px;
      color: var(--err);
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark"></div>
      <span class="brand-name">analysis&#8209;sync</span>
    </div>

    <h1>Welcome</h1>
    <p class="subtitle">Choose where to store your data and set an encryption key.</p>

    <div class="field">
      <label>Database folder</label>
      <div class="input-row">
        <input type="text" id="dbFolder" placeholder="No folder selected" readonly />
        <button class="browse-btn" onclick="pickFolder()">Browse…</button>
      </div>
    </div>

    <div class="field">
      <label>Encryption key</label>
      <input type="password" id="key" placeholder="Enter a strong key" oninput="validate()" />
    </div>

    <div class="field">
      <label>Confirm key</label>
      <input type="password" id="keyConfirm" placeholder="Repeat the key" oninput="validate()" />
    </div>

    <div class="warn">
      <strong>Important:</strong> If you lose your encryption key, your data will be
      permanently inaccessible. Store it in a password manager.
    </div>

    <button class="submit-btn" id="submitBtn" disabled onclick="submit()">Get Started</button>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    const api = window.electronAPI

    let chosenFolder = null

    async function pickFolder() {
      const folder = await api.pickDbFolder()
      if (!folder) return
      chosenFolder = folder
      document.getElementById('dbFolder').value = folder
      validate()
    }

    function validate() {
      const key         = document.getElementById('key').value
      const keyConfirm  = document.getElementById('keyConfirm').value
      const btn         = document.getElementById('submitBtn')
      const errEl       = document.getElementById('errorMsg')

      let err = ''
      if (chosenFolder && key && keyConfirm && key !== keyConfirm) {
        err = 'Keys do not match.'
      }
      errEl.textContent = err
      btn.disabled = !(chosenFolder && key && keyConfirm && key === keyConfirm)
    }

    async function submit() {
      const key    = document.getElementById('key').value
      const btn    = document.getElementById('submitBtn')
      const errEl  = document.getElementById('errorMsg')

      btn.disabled = true
      btn.textContent = 'Starting…'
      errEl.textContent = ''

      const result = await api.completeSetup({ dbFolder: chosenFolder, encryptionKey: key })
      if (!result.ok) {
        errEl.textContent = result.error ?? 'Setup failed.'
        btn.disabled = false
        btn.textContent = 'Get Started'
      }
      // On success the main window opens automatically; this window is closed by main.js
    }
  </script>
</body>
</html>
